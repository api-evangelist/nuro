aid: nuro
name: Nuro
description: >-
  Nuro is a Mountain View-based autonomy company that has pivoted from its
  original autonomous-goods-delivery vehicle program (R1, R2, R3) to a
  licensable, vehicle-agnostic autonomous driving stack. The Nuro Driver is an
  AI-first Level 4 self-driving system, validated through 5+ years of
  driverless deployments and more than 1.7 million autonomous miles with zero
  at-fault incidents, paired with the Nuro Toolkit suite of supporting
  technology. Partners and customers include Uber and Lucid (premium robotaxi
  program with production-intent vehicles announced for CES 2026), Mercedes-
  Benz, Toyota, Kroger, Domino's, and Walmart, with NVIDIA participation in
  recent funding rounds. Nuro has offices in Mountain View, San Francisco,
  Santa Clara, Las Vegas, Houston, Toronto, Washington DC, Shenzhen, Tokyo,
  and an upcoming Munich expansion. Nuro does not publish a public developer
  API; the Driver and Toolkit are commercialized through B2B licensing rather
  than a self-serve developer portal.
